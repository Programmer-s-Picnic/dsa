<!doctype html>

<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Website Builder | Champak — V8 Theme Designer</title>  <!-- Google Ads: keep this if needed; remove while testing locally if it causes console noise. -->  <script async crossorigin="anonymous" src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8321261883090494"></script>  <script src="https://programmer-s-picnic.github.io/json-images/find-on-page.js"></script>  <style>
    :root{
      --builder-bg:#fffaf0;
      --builder-card:#ffffff;
      --builder-line:#f0dcc2;
      --builder-text:#2b2112;
      --builder-muted:#766247;
      --builder-primary:#d97706;
      --builder-accent:#f59e0b;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:Arial, sans-serif;background:var(--builder-bg);color:var(--builder-text)}
    .box{max-width:1180px;margin:24px auto;padding:20px;background:var(--builder-card);border:1px solid var(--builder-line);border-radius:16px;box-shadow:0 14px 36px rgba(111,72,18,.08)}
    button,a.btn-link{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;padding:10px 14px;border:0;border-radius:10px;background:var(--builder-primary);color:white;font-weight:bold;cursor:pointer;margin:6px;min-height:42px}
    button.secondary,a.secondary{background:#fff6e6;color:var(--builder-text);border:1px solid var(--builder-line)}
    button.active{background:var(--builder-accent);color:white;box-shadow:0 0 0 2px #fcd9a2 inset}
    input,textarea{width:100%;max-width:460px;padding:10px;border:1px solid var(--builder-line);border-radius:10px;background:white;color:var(--builder-text)}
    textarea{min-height:95px}
    label{display:block;font-weight:bold;margin:8px 0 6px}
    .options{display:flex;flex-wrap:wrap;gap:8px}
    .progress{height:10px;background:#f7e6c8;border-radius:999px;overflow:hidden;margin:12px 0}
    .progress span{display:block;height:100%;background:linear-gradient(90deg,var(--builder-primary),var(--builder-accent));transition:width .25s ease}
    iframe{width:100%;height:500px;border:1px solid var(--builder-line);border-radius:14px;margin-top:16px;background:white}
    pre{white-space:pre-wrap;background:#fff8ef;border:1px solid var(--builder-line);padding:12px;border-radius:12px;overflow:auto}
    .theme-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px;max-width:760px}
    .color-row{background:#fff8ef;border:1px solid var(--builder-line);border-radius:14px;padding:12px}
    .color-row input[type="color"]{width:70px;height:42px;padding:2px;border-radius:10px;cursor:pointer;vertical-align:middle}
    .color-row input[type="text"]{max-width:150px;margin-left:8px}
    .mini-preview{margin-top:14px;border:1px solid var(--builder-line);border-radius:14px;overflow:hidden;max-width:760px}
    .mini-preview-head{padding:12px 14px;font-weight:bold}
    .mini-preview-body{padding:18px}
    .mini-preview-card{padding:14px;border-radius:14px;margin-top:10px}
    .button-row{display:flex;flex-wrap:wrap;align-items:center;gap:2px}
    hr{border:none;border-top:1px solid var(--builder-line);margin:18px 0}
    @media(max-width:800px){.theme-grid{grid-template-columns:1fr}.box{margin:12px}.button-row button,.button-row a{width:100%;margin:4px 0}}
  </style></head>
<body>
  <div class="box">
    <h1>Website Builder | Champak</h1>
    <h2 id="stepTitle"></h2>
    <div class="progress"><span id="progressBar"></span></div>
    <p id="question"></p><div id="stepArea"></div>

<br />
<button class="secondary" onclick="back()">Back</button>
<button onclick="next()">Next</button>
<button class="secondary" onclick="resetBuilder()">Reset</button>

<hr />

<div class="button-row">
  <button onclick="saveProject()">Save Project</button>
  <button onclick="loadProject()">Load Project</button>
  <button onclick="downloadHTML()">Download HTML</button>
  <button onclick="downloadJSON()">Download JSON</button>
  <button onclick="copyHTML()">Copy HTML</button>
  <a class="btn-link secondary" id="openEditorLink" href="#" target="_blank" rel="noopener noreferrer">Open in Editor</a>
</div>

<iframe id="preview"></iframe>

<h3>JSON Config</h3>
<pre id="jsonView"></pre>

  </div>  <script>
    const steps = [
      { key: "brand", q: "Brand name?", type: "text" },
      { key: "tagline", q: "Tagline?", type: "text" },
      { key: "type", q: "Website type?", type: "options", opt: ["Business", "Healthcare", "Education", "Portfolio", "E-commerce"] },
      { key: "template", q: "Choose template", type: "options", opt: ["Classic", "Split", "Cards"] },
      { key: "theme", q: "Choose starting theme", type: "options", opt: ["Classic", "Deep", "Light", "Custom"] },
      { key: "themeDesigner", q: "Theme Designer: choose your website colors", type: "theme" },
      { key: "sections", q: "Sections?", type: "multi", opt: ["Hero", "About", "Services", "Gallery", "Testimonials", "Contact", "Payment"] },
      { key: "whatsapp", q: "WhatsApp number with country code?", type: "text" },
      { key: "razorpay", q: "Razorpay Payment Button ID or placeholder text?", type: "text" },
      { key: "notes", q: "Extra notes?", type: "textarea" }
    ];

    let state = {
      step: 0,
      data: {
        brand: "Learn with Champak",
        tagline: "A beautiful website made with the wizard",
        type: "Business",
        template: "Classic",
        theme: "Classic",
        themeColors: {
          bg: "#fffaf0",
          text: "#2b2112",
          card: "#ffffff",
          primary: "#d97706",
          accent: "#f59e0b",
          muted: "#766247",
          line: "#f0dcc2"
        },
        sections: ["Hero", "About", "Services", "Contact"],
        whatsapp: "",
        razorpay: "Pay Now",
        notes: ""
      }
    };

    function safe(s) {
      return String(s || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function encodeBase64Unicode(str){
      return btoa(unescape(encodeURIComponent(str)));
    }

    function applyThemePreset(name){
      if(name === "Deep"){
        state.data.themeColors = { bg:"#fff7ed", text:"#321e10", card:"#ffffff", primary:"#c2410c", accent:"#ea580c", muted:"#7c5a43", line:"#fed7aa" };
      } else if(name === "Light"){
        state.data.themeColors = { bg:"#fffdf7", text:"#31261a", card:"#ffffff", primary:"#f59e0b", accent:"#fbbf24", muted:"#7d6a55", line:"#fde68a" };
      } else if(name === "Classic"){
        state.data.themeColors = { bg:"#fffaf0", text:"#2b2112", card:"#ffffff", primary:"#d97706", accent:"#f59e0b", muted:"#766247", line:"#f0dcc2" };
      }
    }

    function render() {
      const s = steps[state.step];

      stepTitle.innerText = "Step " + (state.step + 1) + " of " + steps.length;
      question.innerText = s.q;
      progressBar.style.width = ((state.step + 1) / steps.length) * 100 + "%";

      let html = "";

      if (s.type === "text") {
        html = '<input id="inp" value="' + safe(state.data[s.key]) + '">';
      }

      if (s.type === "textarea") {
        html = '<textarea id="inp">' + safe(state.data[s.key]) + '</textarea>';}

  if (s.type === "options") {
    html = '<div class="options">';
    s.opt.forEach((o) => {
      const active = state.data[s.key] === o ? "active" : "";
      html += '<button class="' + active + '" onclick="setVal(' + JSON.stringify(o) + ')">' + safe(o) + '</button>';
    });
    html += '</div>';
  }

  if (s.type === "multi") {
    html = '<div class="options">';
    s.opt.forEach((o) => {
      const active = state.data.sections.includes(o) ? "active" : "";
      html += '<button class="' + active + '" onclick="toggle(' + JSON.stringify(o) + ')">' + safe(o) + '</button>';
    });
    html += '</div>';
  }

  if (s.type === "theme") {
    html = renderThemeDesigner();
  }

  stepArea.innerHTML = html;
  if(s.type === "theme") bindThemeDesigner();
  updatePreview();
}

function renderThemeDesigner(){
  const c = state.data.themeColors;
  const fields = [
    ["bg", "Background"],
    ["text", "Text"],
    ["card", "Card / Panel"],
    ["primary", "Primary Button"],
    ["accent", "Accent"],
    ["muted", "Muted Text"],
    ["line", "Border / Line"]
  ];

  let html = '<div class="theme-grid">';
  fields.forEach(([key,label]) => {
    html += '<div class="color-row">';
    html += '<label>' + label + '</label>';
    html += '<input type="color" data-color-key="' + key + '" value="' + safe(c[key]) + '">';
    html += '<input type="text" data-color-text="' + key + '" value="' + safe(c[key]) + '">';
    html += '</div>';
  });
  html += '</div>';

  html += '<div class="toolbar">';
  html += '<button onclick="applyCustomThemePreset(' + JSON.stringify('Classic') + ')">Classic Preset</button>';
  html += '<button onclick="applyCustomThemePreset(' + JSON.stringify('Deep') + ')">Deep Preset</button>';
  html += '<button onclick="applyCustomThemePreset(' + JSON.stringify('Light') + ')">Light Preset</button>';
  html += '</div>';

  html += '<div class="mini-preview" id="themeMiniPreview"></div>';
  return html;
}

function bindThemeDesigner(){
  document.querySelectorAll('[data-color-key]').forEach(input => {
    input.addEventListener('input', function(){
      const key = this.getAttribute('data-color-key');
      state.data.themeColors[key] = this.value;
      const textInput = document.querySelector('[data-color-text="' + key + '"]');
      if(textInput) textInput.value = this.value;
      state.data.theme = "Custom";
      updateThemeMiniPreview();
      updatePreview();
    });
  });

  document.querySelectorAll('[data-color-text]').forEach(input => {
    input.addEventListener('input', function(){
      const key = this.getAttribute('data-color-text');
      if(/^#[0-9A-Fa-f]{6}$/.test(this.value)){
        state.data.themeColors[key] = this.value;
        const colorInput = document.querySelector('[data-color-key="' + key + '"]');
        if(colorInput) colorInput.value = this.value;
        state.data.theme = "Custom";
        updateThemeMiniPreview();
        updatePreview();
      }
    });
  });

  updateThemeMiniPreview();
}

function updateThemeMiniPreview(){
  const box = document.getElementById('themeMiniPreview');
  if(!box) return;
  const c = state.data.themeColors;
  box.innerHTML =
    '<div class="mini-preview-head" style="background:' + safe(c.primary) + ';color:white">Theme Preview Header</div>' +
    '<div class="mini-preview-body" style="background:' + safe(c.bg) + ';color:' + safe(c.text) + '">' +
      '<h3 style="margin-top:0;color:' + safe(c.text) + '">Sample Heading</h3>' +
      '<p style="color:' + safe(c.muted) + '">This shows background, text, muted text, card and button colors.</p>' +
      '<button style="background:' + safe(c.primary) + ';color:white">Primary</button>' +
      '<button style="background:' + safe(c.accent) + ';color:white">Accent</button>' +
      '<div class="mini-preview-card" style="background:' + safe(c.card) + ';border:1px solid ' + safe(c.line) + '">Sample Card</div>' +
    '</div>';
}

function applyCustomThemePreset(name){
  state.data.theme = name;
  applyThemePreset(name);
  render();
}

function saveCurrentInput() {
  const s = steps[state.step];
  if (s.type === "text" || s.type === "textarea") {
    const input = document.getElementById("inp");
    if (input) state.data[s.key] = input.value;
  }
}

function next() {
  saveCurrentInput();
  if (state.step < steps.length - 1) {
    state.step++;
    render();
  }
}

function back() {
  saveCurrentInput();
  if (state.step > 0) {
    state.step--;
    render();
  }
}

function setVal(v) {
  const key = steps[state.step].key;
  state.data[key] = v;
  if(key === "theme") applyThemePreset(v);
  render();
}

function toggle(v) {
  const arr = state.data.sections;
  const i = arr.indexOf(v);
  if (i >= 0) arr.splice(i, 1);
  else arr.push(v);
  render();
}

function resetBuilder() {
  state.step = 0;
  state.data = {
    brand: "Learn with Champak",
    tagline: "A beautiful website made with the wizard",
    type: "Business",
    template: "Classic",
    theme: "Classic",
    themeColors: { bg:"#fffaf0", text:"#2b2112", card:"#ffffff", primary:"#d97706", accent:"#f59e0b", muted:"#766247", line:"#f0dcc2" },
    sections: ["Hero", "About", "Services", "Contact"],
    whatsapp: "",
    razorpay: "Pay Now",
    notes: ""
  };
  render();
}

function colors() {
  return state.data.themeColors || { bg:"#fffaf0", text:"#2b2112", card:"#ffffff", primary:"#d97706", accent:"#f59e0b", muted:"#766247", line:"#f0dcc2" };
}

function buildHTML() {
  const d = state.data;
  const c = colors();
  const split = d.template === "Split";
  const cards = d.template === "Cards";

  let html = '<!doctype html><html lang="en"><head><meta charset="utf-8">';
  html += '<meta name="viewport" content="width=device-width,initial-scale=1">';
  html += '<title>' + safe(d.brand) + '</title>';
  html += '<meta name="description" content="' + safe(d.tagline) + '">';
  html += '<style>';
  html += ':root{--bg:' + c.bg + ';--text:' + c.text + ';--card:' + c.card + ';--primary:' + c.primary + ';--accent:' + c.accent + ';--muted:' + c.muted + ';--line:' + c.line + '}';
  html += '*{box-sizing:border-box}';
  html += 'body{margin:0;font-family:Arial;background:var(--bg);color:var(--text);line-height:1.6}';
  html += 'a{text-decoration:none;color:inherit}';
  html += 'header{position:sticky;top:0;background:var(--card);border-bottom:1px solid var(--line);padding:16px 24px;display:flex;justify-content:space-between;gap:16px;flex-wrap:wrap;z-index:10}';
  html += '.brand{font-weight:900;color:var(--primary);font-size:22px}';
  html += 'nav{display:flex;gap:14px;flex-wrap:wrap;color:var(--muted);font-weight:bold}';
  html += 'section{padding:56px 24px;max-width:1100px;margin:auto}';
  html += '.hero{text-align:' + (split ? 'left' : 'center') + ';display:grid;grid-template-columns:' + (split ? '1.2fr .8fr' : '1fr') + ';gap:20px;align-items:center}';
  html += '.panel,.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 10px 28px rgba(0,0,0,.06)}';
  html += '.btn{display:inline-block;background:var(--primary);color:white;padding:12px 18px;border-radius:12px;text-decoration:none;font-weight:bold;margin:6px}';
  html += '.btn.alt{background:var(--accent)}';
  html += '.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}';
  html += '.gallery{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.photo{height:130px;background:var(--card);border:1px solid var(--line);border-radius:14px;display:grid;place-items:center;color:var(--muted)}';
  html += 'footer{text-align:center;padding:28px;background:var(--card);border-top:1px solid var(--line);color:var(--muted)}';
  html += '@media(max-width:800px){.hero,.grid,.gallery{grid-template-columns:1fr}}';
  html += '</style></head><body>';

  html += '<header><div class="brand">' + safe(d.brand) + '</div><nav>';
  d.sections.forEach((sec) => {
    if (sec !== "Hero") html += '<a href="#' + safe(sec.toLowerCase()) + '">' + safe(sec) + '</a>';
  });
  html += '</nav></header>';

  if (d.sections.includes("Hero")) {
    html += '<section class="hero">';
    html += '<div><h1>' + safe(d.brand) + '</h1><p>' + safe(d.tagline) + '</p><a class="btn" href="#contact">Contact Us</a><a class="btn alt" href="#services">Explore</a></div>';
    if (split || cards) html += '<div class="panel"><h3>' + safe(d.type) + ' Website</h3><p>Generated from your wizard answers.</p></div>';
    html += '</section>';
  }

  if (d.sections.includes("About")) {
    html += '<section id="about"><h2>About</h2><p>This is a ' + safe(d.type) + ' website for ' + safe(d.brand) + '. Replace this text with real content.</p></section>';
  }

  if (d.sections.includes("Services")) {
    html += '<section id="services"><h2>Services</h2><div class="grid">';
    html += '<div class="card"><h3>Service 1</h3><p>Describe your first service.</p></div>';
    html += '<div class="card"><h3>Service 2</h3><p>Describe your second service.</p></div>';
    html += '<div class="card"><h3>Service 3</h3><p>Describe your third service.</p></div>';
    html += '</div></section>';
  }

  if (d.sections.includes("Gallery")) {
    html += '<section id="gallery"><h2>Gallery</h2><div class="gallery"><div class="photo">Image</div><div class="photo">Image</div><div class="photo">Image</div></div></section>';
  }

  if (d.sections.includes("Testimonials")) {
    html += '<section id="testimonials"><h2>Testimonials</h2><div class="panel"><p>“A helpful testimonial can appear here.”</p></div></section>';
  }

  if (d.sections.includes("Contact")) {
    html += '<section id="contact"><h2>Contact</h2><div class="panel">';
    html += '<p>Email / phone / enquiry form can be added here.</p>';
    if (d.whatsapp) html += '<a class="btn" href="https://wa.me/' + safe(d.whatsapp) + '">Chat on WhatsApp</a>';
    html += '</div></section>';
  }

  if (d.sections.includes("Payment")) {
    html += '<section id="payment"><h2>Payment</h2><div class="panel">';
    html += '<button style="background:var(--primary);color:white;padding:12px 18px;border:0;border-radius:12px;font-weight:bold">' + safe(d.razorpay || "Pay Now") + '</button>';
    html += '<p>This is a Razorpay placeholder. Replace with real Razorpay Checkout integration later.</p>';
    html += '</div></section>';
  }

  html += '<footer>© ' + safe(d.brand) + '</footer>';
  html += '</body></html>';

  return html;
}

function updateEditorLink(){
  const html = buildHTML();
  const encoded = encodeBase64Unicode(html).replace(/\+/g,'-').replace(/\//g,'_').replace(/=+$/,'');
  const url = 'https://editor.learnwithchampak.live/samples/html/preview/#code=' + encoded;
  document.getElementById('openEditorLink').href = url;
}

function updatePreview() {
  saveCurrentInputIfAvailable();
  const html = buildHTML();
  preview.srcdoc = html;
  jsonView.innerText = JSON.stringify(state.data, null, 2);
  updateEditorLink();
}

function saveCurrentInputIfAvailable(){
  const s = steps[state.step];
  const input = document.getElementById("inp");
  if(input && (s.type === "text" || s.type === "textarea")) state.data[s.key] = input.value;
}

function downloadHTML() {
  saveCurrentInput();
  const blob = new Blob([buildHTML()], { type: "text/html" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "website.html";
  a.click();
}

function downloadJSON() {
  saveCurrentInput();
  const blob = new Blob([JSON.stringify(state.data, null, 2)], { type: "application/json" });
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "website-config.json";
  a.click();
}

function copyHTML() {
  saveCurrentInput();
  navigator.clipboard.writeText(buildHTML());
  alert("HTML copied");
}

function saveProject() {
  saveCurrentInput();
  localStorage.setItem("websiteBuilderChampak", JSON.stringify(state.data));
  alert("Project saved");
}

function loadProject() {
  const saved = localStorage.getItem("websiteBuilderChampak");
  if (saved) {
    state.data = JSON.parse(saved);
    if(!state.data.themeColors) applyThemePreset(state.data.theme || "Classic");
    state.step = 0;
    render();
    alert("Project loaded");
  } else {
    alert("No saved project found");
  }
}

render();

  </script>
</body>
</html>
