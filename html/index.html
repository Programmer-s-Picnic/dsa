<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Website Builder V5</title>

<style>
body{font-family:Arial;margin:0;background:#fffaf0;color:#2b2112}
.box{max-width:1100px;margin:30px auto;padding:20px;border:1px solid #f0dcc2;border-radius:12px;background:#fff}

button{padding:10px 14px;border:none;background:#d97706;color:#fff;border-radius:8px;cursor:pointer;margin:4px;font-weight:bold}
button.secondary{background:#fff6e6;color:#2b2112;border:1px solid #f0dcc2}
button.active{background:#f59e0b}

.options{display:flex;flex-wrap:wrap;gap:8px}
input{padding:10px;border:1px solid #f0dcc2;border-radius:8px;width:100%;max-width:400px}

.progress{height:10px;background:#f7e6c8;border-radius:999px;overflow:hidden;margin:10px 0}
.progress span{display:block;height:100%;background:linear-gradient(90deg,#d97706,#f59e0b)}

iframe{width:100%;height:420px;border:none;margin-top:15px;border-radius:10px}
</style>
</head>

<body>

<div class="box">

<h2 id="stepTitle"></h2>
<div class="progress"><span id="progressBar"></span></div>
<p id="question"></p>

<div id="stepArea"></div>

<button class="secondary" onclick="back()">Back</button>
<button onclick="next()">Next</button>
<button class="secondary" onclick="reset()">Reset</button>

<iframe id="preview"></iframe>

<button onclick="download()">Download HTML</button>

</div>

<script>

const steps=[
{key:"brand",q:"Brand name?",type:"text"},
{key:"type",q:"Website type?",type:"options",opt:["Business","Healthcare","Education"]},
{key:"template",q:"Choose template",type:"options",opt:["Classic","Split"]},
{key:"sections",q:"Sections?",type:"multi",opt:["Hero","About","Services","Contact"]},
{key:"whatsapp",q:"WhatsApp number?",type:"text"},
{key:"payment",q:"Enable payment?",type:"options",opt:["Yes","No"]}
];

let state={
step:0,
data:{
brand:"My Site",
type:"Business",
template:"Classic",
sections:["Hero","About","Services","Contact"],
whatsapp:"",
payment:"No"
}
};

function render(){
let s=steps[state.step];

stepTitle.innerText="Step "+(state.step+1)+" of "+steps.length;
question.innerText=s.q;
progressBar.style.width=((state.step+1)/steps.length*100)+"%";

let html="";

if(s.type==="text"){
html=`<input id="inp" value="${state.data[s.key]||''}">`;
}

if(s.type==="options"){
html='<div class="options">';
s.opt.forEach(o=>{
let a=state.data[s.key]===o?"active":"";
html+=`<button class="${a}" onclick="setVal('${o}')">${o}</button>`;
});
html+='</div>';
}

if(s.type==="multi"){
html='<div class="options">';
s.opt.forEach(o=>{
let a=state.data[s.key].includes(o)?"active":"";
html+=`<button class="${a}" onclick="toggle('${o}')">${o}</button>`;
});
html+='</div>';
}

stepArea.innerHTML=html;
update();
}

function next(){
let s=steps[state.step];
if(s.type==="text"){
state.data[s.key]=document.getElementById("inp").value;
}
if(state.step<steps.length-1){
state.step++;
render();
}
}

function back(){if(state.step>0){state.step--;render();}}

function setVal(v){
state.data[steps[state.step].key]=v;
render();
}

function toggle(v){
let arr=state.data.sections;
let i=arr.indexOf(v);
if(i>=0)arr.splice(i,1);else arr.push(v);
render();
}

function reset(){
state.step=0;
render();
}

function build(){

let a=state.data;

let nav=`<header style="padding:15px;background:#d97706;color:#fff;display:flex;justify-content:space-between">
<div>${a.brand}</div>
<div>${a.sections.join(" | ")}</div>
</header>`;

let hero=a.sections.includes("Hero")?`
<section style="padding:50px;text-align:center">
<h1>${a.brand}</h1>
<p>${a.type} website</p>
</section>`:"";

let about=a.sections.includes("About")?`
<section><h2>About</h2><p>About your site</p></section>`:"";

let services=a.sections.includes("Services")?`
<section><h2>Services</h2><p>Your services</p></section>`:"";

let contact=a.sections.includes("Contact")?`
<section><h2>Contact</h2>`+
(a.whatsapp?`<a href="https://wa.me/${a.whatsapp}">WhatsApp</a>`:"")+
`</section>`:"";

let payment=a.payment==="Yes"?`
<section><button>Pay Now (Razorpay)</button></section>`:"";

return `
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width">
<title>${a.brand}</title>
</head>
<body style="margin:0;font-family:Arial;background:#fffaf0">

${nav}
${hero}
${about}
${services}
${contact}
${payment}

<footer style="padding:20px;text-align:center;background:#fff4df">
© ${a.brand}
</footer>

</body>
</html>
`;
}

function update(){
preview.srcdoc=build();
}

function download(){
let blob=new Blob([build()],{type:"text/html"});
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="website.html";
a.click();
}

render();

</script>

</body>
</html>
