<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Website Builder Wizard — Live Preview</title>
  <style>
    :root{
      --bg:#fffaf0;
      --card:#ffffff;
      --text:#2b2112;
      --muted:#6b5c3b;
      --brand:#d97706;
      --brand-2:#f59e0b;
      --line:#eadfc8;
      --shadow:0 12px 28px rgba(0,0,0,.08);
      --radius:18px;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#fffaf0 0%,#fff4df 100%);
      color:var(--text);
    }

    .wrap{
      max-width:1400px;
      margin:0 auto;
      padding:20px;
    }

    .topbar{
      background:rgba(255,255,255,.9);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      padding:18px 20px;
      margin-bottom:18px;
    }

    .topbar h1{
      margin:0 0 8px;
      font-size:30px;
    }

    .topbar p{
      margin:0;
      color:var(--muted);
    }

    .layout{
      display:grid;
      grid-template-columns:420px 1fr;
      gap:18px;
      align-items:start;
    }

    .panel{
      background:rgba(255,255,255,.92);
      border:1px solid var(--line);
      border-radius:20px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .panel-head{
      padding:16px 18px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#fffdfa 0%,#fff6e8 100%);
    }

    .panel-head h2{
      margin:0;
      font-size:20px;
    }

    .panel-body{
      padding:18px;
    }

    .step-meta{
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:center;
      margin-bottom:12px;
      color:var(--muted);
      font-size:14px;
      font-weight:700;
    }

    .progress{
      width:100%;
      height:10px;
      background:#f4ead4;
      border-radius:999px;
      overflow:hidden;
      border:1px solid #eadcb9;
      margin-bottom:18px;
    }

    .progress > span{
      display:block;
      height:100%;
      width:0%;
      background:linear-gradient(90deg,var(--brand),var(--brand-2));
      transition:width .3s ease;
    }

    .question{
      font-size:26px;
      line-height:1.2;
      margin:0 0 10px;
    }

    .help{
      margin:0 0 16px;
      color:var(--muted);
    }

    .options{
      display:grid;
      gap:12px;
    }

    .option{
      border:1px solid var(--line);
      background:#fff;
      border-radius:16px;
      padding:14px 14px;
      cursor:pointer;
      transition:.18s ease;
    }

    .option:hover{
      border-color:var(--brand);
      transform:translateY(-1px);
      box-shadow:0 8px 20px rgba(217,119,6,.08);
    }

    .option.active{
      border:2px solid var(--brand);
      background:#fff7ea;
    }

    .option-title{
      font-weight:800;
      font-size:16px;
      display:block;
      margin-bottom:4px;
    }

    .option-desc{
      color:var(--muted);
      font-size:13px;
      display:block;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
      padding-top:18px;
      border-top:1px solid var(--line);
    }

    button{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:11px 16px;
      cursor:pointer;
      font-weight:800;
      font:inherit;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--brand),var(--brand-2));
      color:#fff;
    }

    .btn-soft{
      background:#fff7ea;
      color:var(--text);
      border:1px solid var(--line);
    }

    .btn-dark{
      background:#2b2112;
      color:#fff;
    }

    .preview-wrap{
      display:grid;
      grid-template-rows:auto 520px auto;
      gap:0;
    }

    .preview-toolbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:14px 16px;
      border-bottom:1px solid var(--line);
      background:linear-gradient(180deg,#fffdfa 0%,#fff6e8 100%);
    }

    .preview-toolbar .left{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      align-items:center;
    }

    .badge{
      padding:7px 10px;
      border-radius:999px;
      background:#fff7ea;
      border:1px solid var(--line);
      font-size:12px;
      font-weight:800;
      color:#7c5410;
    }

    iframe{
      width:100%;
      height:100%;
      border:none;
      background:#fff;
    }

    .code-box{
      border-top:1px solid var(--line);
      background:#fffdfa;
      padding:14px 16px 16px;
    }

    .code-box h3{
      margin:0 0 10px;
      font-size:16px;
    }

    textarea{
      width:100%;
      min-height:240px;
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      font:13px/1.5 Consolas,Monaco,monospace;
      resize:vertical;
      background:#fff;
      color:#2b2112;
    }

    .summary{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
      margin-bottom:16px;
    }

    .summary .box{
      border:1px solid var(--line);
      background:#fffdfa;
      border-radius:14px;
      padding:12px;
    }

    .summary .label{
      font-size:12px;
      color:var(--muted);
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.04em;
      margin-bottom:6px;
    }

    .summary .value{
      font-weight:700;
    }

    @media (max-width:1100px){
      .layout{
        grid-template-columns:1fr;
      }
      .preview-wrap{
        grid-template-rows:auto 420px auto;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <h1>Website Builder Wizard</h1>
      <p>Choose options on the left. The website skeleton updates live on the right at every step.</p>
    </div>

    <div class="layout">
      <section class="panel">
        <div class="panel-head">
          <h2>Design Wizard</h2>
        </div>
        <div class="panel-body">
          <div class="step-meta">
            <span id="stepText">Step 1</span>
            <span id="stepSmall">Live preview enabled</span>
          </div>
          <div class="progress">
            <span id="progressBar"></span>
          </div>

          <div class="summary" id="summary"></div>

          <h3 class="question" id="question"></h3>
          <p class="help" id="help"></p>

          <div class="options" id="options"></div>

          <div class="actions">
            <button class="btn-soft" id="backBtn">Back</button>
            <button class="btn-primary" id="nextBtn">Next</button>
            <button class="btn-soft" id="skipBtn">Skip</button>
            <button class="btn-dark" id="restartBtn">Start Again</button>
            <button class="btn-primary" id="downloadBtn">Download HTML</button>
          </div>
        </div>
      </section>

      <section class="panel preview-wrap">
        <div class="preview-toolbar">
          <div class="left">
            <span class="badge">Live Skeleton View</span>
            <span class="badge" id="siteTypeBadge">Type: Default</span>
            <span class="badge" id="styleBadge">Style: Default</span>
            <span class="badge" id="themeBadge">Theme: Orange</span>
          </div>
        </div>

        <iframe id="previewFrame" title="Live Website Preview"></iframe>

        <div class="code-box">
          <h3>Generated HTML</h3>
          <textarea id="codeView"></textarea>
        </div>
      </section>
    </div>
  </div>

  <script>
    const state = {
      step: 0,
      answers: {
        brandName: "Your Brand",
        siteType: "",
        style: "",
        colorTheme: "Orange",
        layout: "",
        sections: [],
        contactMode: "",
        heroTone: ""
      }
    };

    const steps = [
      {
        key: "brandName",
        title: "What is your website or brand name?",
        help: "This is used immediately in the live preview.",
        type: "text",
        placeholder: "Example: Cure Centre, Champak Studio, Sunrise Academy"
      },
      {
        key: "siteType",
        title: "What type of website do you want?",
        help: "This influences the headings, default content blocks, and emphasis.",
        type: "single",
        options: [
          { label: "Business", desc: "Company, agency, or service website" },
          { label: "Portfolio", desc: "Personal or showcase website" },
          { label: "Blog", desc: "Articles and content-first website" },
          { label: "Educational", desc: "Courses, coaching, training, school" },
          { label: "Healthcare", desc: "Clinic, hospital, wellness, care" },
          { label: "E-commerce", desc: "Products and buying-focused website" }
        ]
      },
      {
        key: "style",
        title: "What visual style do you want?",
        help: "This changes spacing, card treatment, background feel, and section tone.",
        type: "single",
        options: [
          { label: "Modern", desc: "Clean, polished, current" },
          { label: "Minimal", desc: "Simple, airy, quiet" },
          { label: "Colorful", desc: "Bright and energetic" },
          { label: "Corporate", desc: "Structured and formal" },
          { label: "Elegant", desc: "Smooth, premium, refined" },
          { label: "Dark", desc: "Dark mode inspired layout" }
        ]
      },
      {
        key: "colorTheme",
        title: "Choose a color theme",
        help: "This updates the live CSS colors right away.",
        type: "single",
        options: [
          { label: "Orange", desc: "Warm and inviting" },
          { label: "Blue", desc: "Trustworthy and calm" },
          { label: "Green", desc: "Fresh and healing" },
          { label: "Purple", desc: "Creative and premium" },
          { label: "Black", desc: "Bold and modern" }
        ]
      },
      {
        key: "layout",
        title: "Which layout direction do you prefer?",
        help: "This controls how the skeleton is arranged.",
        type: "single",
        options: [
          { label: "Classic", desc: "Hero, sections, footer" },
          { label: "Cards", desc: "Section cards with rounded panels" },
          { label: "Split", desc: "Two-column emphasis" },
          { label: "Landing Page", desc: "Conversion-focused single page" }
        ]
      },
      {
        key: "sections",
        title: "Which sections should the site have?",
        help: "Choose as many as you want. The preview updates as you toggle them.",
        type: "multi",
        options: [
          { label: "Hero", desc: "Top section with headline and CTA" },
          { label: "About", desc: "Introductory content" },
          { label: "Services", desc: "Services or offerings" },
          { label: "Products", desc: "Product grid" },
          { label: "Gallery", desc: "Visual showcase" },
          { label: "Testimonials", desc: "Trust and feedback" },
          { label: "Pricing", desc: "Plans or packages" },
          { label: "FAQ", desc: "Common questions" },
          { label: "Contact", desc: "Contact options" },
          { label: "Blog", desc: "Articles and posts" }
        ]
      },
      {
        key: "contactMode",
        title: "How should visitors contact you?",
        help: "The contact section will adapt to the selected method.",
        type: "single",
        options: [
          { label: "Form", desc: "Standard enquiry form" },
          { label: "WhatsApp", desc: "Direct chat CTA" },
          { label: "Phone", desc: "Call buttons and phone focus" },
          { label: "All", desc: "Form, WhatsApp, and phone together" }
        ]
      },
      {
        key: "heroTone",
        title: "What should the hero section feel like?",
        help: "This changes the headline and support text in the preview.",
        type: "single",
        options: [
          { label: "Professional", desc: "Direct, clear, formal" },
          { label: "Warm", desc: "Friendly and human" },
          { label: "Bold", desc: "Strong and high-energy" },
          { label: "Calm", desc: "Soft and reassuring" }
        ]
      }
    ];

    function renderStep() {
      const step = steps[state.step];
      const total = steps.length;
      const progress = ((state.step + 1) / total) * 100;

      document.getElementById("stepText").textContent = `Step ${state.step + 1} of ${total}`;
      document.getElementById("progressBar").style.width = `${progress}%`;
      document.getElementById("question").textContent = step.title;
      document.getElementById("help").textContent = step.help;
      document.getElementById("stepSmall").textContent = step.type === "multi"
        ? "Multi-select step"
        : step.type === "text"
        ? "Type and preview instantly"
        : "Choose one option";

      renderSummary();
      renderOptions(step);
      renderLivePreview();
    }

    function renderSummary() {
      const s = state.answers;
      const summary = document.getElementById("summary");

      const sectionsText = s.sections.length ? s.sections.join(", ") : "None yet";

      summary.innerHTML = `
        <div class="box">
          <div class="label">Brand</div>
          <div class="value">${escapeHtml(s.brandName || "Your Brand")}</div>
        </div>
        <div class="box">
          <div class="label">Site Type</div>
          <div class="value">${escapeHtml(s.siteType || "Not chosen")}</div>
        </div>
        <div class="box">
          <div class="label">Style</div>
          <div class="value">${escapeHtml(s.style || "Not chosen")}</div>
        </div>
        <div class="box">
          <div class="label">Sections</div>
          <div class="value">${escapeHtml(sectionsText)}</div>
        </div>
      `;
    }

    function renderOptions(step) {
      const box = document.getElementById("options");
      box.innerHTML = "";

      if (step.type === "text") {
        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = step.placeholder || "";
        input.value = state.answers[step.key] || "";
        input.style.width = "100%";
        input.style.padding = "14px 15px";
        input.style.border = "1px solid var(--line)";
        input.style.borderRadius = "14px";
        input.style.font = "inherit";
        input.addEventListener("input", (e) => {
          state.answers[step.key] = e.target.value.trim() || "Your Brand";
          renderSummary();
          renderLivePreview();
        });
        box.appendChild(input);
        return;
      }

      step.options.forEach(opt => {
        const item = document.createElement("button");
        item.className = "option";
        item.type = "button";

        const current = state.answers[step.key];
        if (step.type === "single" && current === opt.label) item.classList.add("active");
        if (step.type === "multi" && Array.isArray(current) && current.includes(opt.label)) item.classList.add("active");

        item.innerHTML = `
          <span class="option-title">${escapeHtml(opt.label)}</span>
          <span class="option-desc">${escapeHtml(opt.desc)}</span>
        `;

        item.addEventListener("click", () => {
          if (step.type === "single") {
            state.answers[step.key] = opt.label;
          } else if (step.type === "multi") {
            const arr = state.answers[step.key] || [];
            const i = arr.indexOf(opt.label);
            if (i >= 0) {
              arr.splice(i, 1);
            } else {
              arr.push(opt.label);
            }
            state.answers[step.key] = arr;
          }
          renderStep();
        });

        box.appendChild(item);
      });
    }

    function nextStep() {
      if (state.step < steps.length - 1) {
        state.step++;
        renderStep();
      } else {
        renderLivePreview();
        alert("The skeleton website is ready. You can download the generated HTML.");
      }
    }

    function prevStep() {
      if (state.step > 0) {
        state.step--;
        renderStep();
      }
    }

    function skipStep() {
      state.step = Math.min(state.step + 1, steps.length - 1);
      renderStep();
    }

    function restart() {
      state.step = 0;
      state.answers = {
        brandName: "Your Brand",
        siteType: "",
        style: "",
        colorTheme: "Orange",
        layout: "",
        sections: [],
        contactMode: "",
        heroTone: ""
      };
      renderStep();
    }

    function getThemeColors(theme) {
      switch (theme) {
        case "Blue":
          return { primary:"#2563eb", secondary:"#60a5fa", bg:"#eff6ff", card:"#ffffff", text:"#172554", soft:"#dbeafe" };
        case "Green":
          return { primary:"#15803d", secondary:"#4ade80", bg:"#f0fdf4", card:"#ffffff", text:"#14532d", soft:"#dcfce7" };
        case "Purple":
          return { primary:"#7c3aed", secondary:"#c084fc", bg:"#faf5ff", card:"#ffffff", text:"#4c1d95", soft:"#ede9fe" };
        case "Black":
          return { primary:"#111827", secondary:"#374151", bg:"#f3f4f6", card:"#ffffff", text:"#111827", soft:"#e5e7eb" };
        default:
          return { primary:"#d97706", secondary:"#f59e0b", bg:"#fffaf0", card:"#ffffff", text:"#2b2112", soft:"#ffedd5" };
      }
    }

    function buildWebsiteHTML() {
      const s = state.answers;
      const theme = getThemeColors(s.colorTheme);
      const sections = s.sections || [];

      const brandName = s.brandName || "Your Brand";
      const siteType = s.siteType || "Website";
      const style = s.style || "Modern";
      const layout = s.layout || "Classic";
      const heroTone = s.heroTone || "Professional";
      const contactMode = s.contactMode || "Form";

      const heroText = getHeroText(siteType, heroTone, brandName);
      const layoutClass = layout.toLowerCase().replace(/\s+/g, "-");
      const darkAdjust = style === "Dark"
        ? `
          --page-bg:#0f172a;
          --card:#111827;
          --text:#f8fafc;
          --muted:#cbd5e1;
          --line:#334155;
          --header-bg:#111827;
          --section-alt:#0b1220;
        `
        : `
          --page-bg:${theme.bg};
          --card:${theme.card};
          --text:${theme.text};
          --muted:#6b7280;
          --line:${theme.soft};
          --header-bg:${theme.card};
          --section-alt:#ffffff;
        `;

      const cardsMode = layout === "Cards";
      const splitMode = layout === "Split";
      const landingMode = layout === "Landing Page";

      const sectionCardOpen = cardsMode ? `<div class="section-card">` : ``;
      const sectionCardClose = cardsMode ? `</div>` : ``;

      const servicesTitle = siteType === "Healthcare" ? "Care Services" :
                            siteType === "Educational" ? "Programs" :
                            siteType === "E-commerce" ? "Highlights" : "Services";

      const sectionsHTML = `
        ${sections.includes("Hero") || sections.length === 0 ? `
          <section class="hero ${splitMode ? "split-hero" : ""}">
            <div class="hero-inner">
              <div>
                <span class="eyebrow">${escapeHtml(siteType)} • ${escapeHtml(style)} Style</span>
                <h1>${escapeHtml(heroText.title)}</h1>
                <p>${escapeHtml(heroText.text)}</p>
                <div class="cta-row">
                  <a href="#contact" class="btn primary">Get Started</a>
                  <a href="#about" class="btn soft">Learn More</a>
                </div>
              </div>
              ${splitMode || landingMode ? `
                <div class="hero-card">
                  <h3>Quick Skeleton Panel</h3>
                  <p>This panel changes as the user answers the wizard questions.</p>
                  <ul>
                    <li>Brand: ${escapeHtml(brandName)}</li>
                    <li>Layout: ${escapeHtml(layout)}</li>
                    <li>Contact: ${escapeHtml(contactMode)}</li>
                  </ul>
                </div>
              ` : ``}
            </div>
          </section>
        ` : ""}

        ${sections.includes("About") ? `
          <section id="about">
            ${sectionCardOpen}
            <h2>About ${escapeHtml(brandName)}</h2>
            <p>
              This is a starter about section for a ${escapeHtml(siteType.toLowerCase())} website.
              Replace this text with your real story, values, purpose, and trust-building content.
            </p>
            ${sectionCardClose}
          </section>
        ` : ""}

        ${sections.includes("Services") ? `
          <section>
            ${sectionCardOpen}
            <h2>${escapeHtml(servicesTitle)}</h2>
            <div class="grid three">
              <article class="card-item"><h3>Service One</h3><p>Short description of the first offering.</p></article>
              <article class="card-item"><h3>Service Two</h3><p>Short description of the second offering.</p></article>
              <article class="card-item"><h3>Service Three</h3><p>Short description of the third offering.</p></article>
            </div>
            ${sectionCardClose}
          </section>
        ` : ""}

        ${sections.includes("Products") ? `
          <section>
            ${sectionCardOpen}
            <h2>Featured Products</h2>
            <div class="grid three">
              <article class="card-item"><h3>Product One</h3><p>Short description of the product.</p></article>
              <article class="card-item"><h3>Product Two</h3><p>Short description of the product.</p></article>
              <article class="card-item"><h3>Product Three</h3><p>Short description of the product.</p></article>
            </div>
            ${sectionCardClose}
          </section>
        ` : ""}

        ${sections.includes("Gallery") ? `
          <section>
            ${sectionCardOpen}
            <h2>Gallery</h2>
            <div class="grid three">
              <div class="gallery-box">Image Area</div>
              <div class="gallery-box">Image Area</div>
              <div class="gallery-box">Image Area</div>
            </div>
            ${sectionCardClose}
          </section>
        ` : ""}

        ${sections.includes("Testimonials") ? `
          <section>
            ${sectionCardOpen}
            <h2>Testimonials</h2>
            <div class="grid two">
              <blockquote class="quote">“A strong testimonial can go here.”</blockquote>
              <blockquote class="quote">“Another piece of trust-building feedback.”</blockquote>
            </div>
            ${sectionCardClose}
          </section>
        ` : ""}

        ${sections.includes("Pricing") ? `
          <section>
            ${sectionCardOpen}
            <h2>Pricing</h2>
            <div class="grid three">
              <article class="price-card"><h3>Basic</h3><p>₹999</p></article>
              <article class="price-card"><h3>Standard</h3><p>₹2499</p></article>
              <article class="price-card"><h3>Premium</h3><p>₹4999</p></article>
            </div>
            ${sectionCardClose}
          </section>
        ` : ""}

        ${sections.includes("FAQ") ? `
          <section>
            ${sectionCardOpen}
            <h2>Frequently Asked Questions</h2>
            <div class="faq">
              <div class="faq-item"><strong>Question 1</strong><p>Short answer placeholder.</p></div>
              <div class="faq-item"><strong>Question 2</strong><p>Short answer placeholder.</p></div>
              <div class="faq-item"><strong>Question 3</strong><p>Short answer placeholder.</p></div>
            </div>
            ${sectionCardClose}
          </section>
        ` : ""}

        ${sections.includes("Blog") ? `
          <section>
            ${sectionCardOpen}
            <h2>Latest Posts</h2>
            <div class="grid three">
              <article class="card-item"><h3>Blog Post One</h3><p>Starter excerpt text goes here.</p></article>
              <article class="card-item"><h3>Blog Post Two</h3><p>Starter excerpt text goes here.</p></article>
              <article class="card-item"><h3>Blog Post Three</h3><p>Starter excerpt text goes here.</p></article>
            </div>
            ${sectionCardClose}
          </section>
        ` : ""}

        ${sections.includes("Contact") || sections.length === 0 ? `
          <section id="contact">
            ${sectionCardOpen}
            <h2>Contact</h2>
            ${buildContactHTML(contactMode)}
            ${sectionCardClose}
          </section>
        ` : ""}
      `;

      return `<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>${escapeHtml(brandName)} — ${escapeHtml(siteType)}</title>
<meta name="description" content="Starter skeleton website generated by the Website Builder Wizard.">
<style>
  :root{
    --primary:${theme.primary};
    --secondary:${theme.secondary};
    ${darkAdjust}
  }

  *{box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    margin:0;
    font-family:Inter,Arial,sans-serif;
    background:var(--page-bg);
    color:var(--text);
    line-height:1.6;
  }
  a{text-decoration:none;color:inherit}
  .container{
    width:min(1180px, calc(100% - 32px));
    margin:auto;
  }
  header{
    position:sticky;
    top:0;
    z-index:10;
    background:rgba(255,255,255,.88);
    backdrop-filter:blur(12px);
    border-bottom:1px solid var(--line);
  }
  ${style === "Dark" ? `
  header{background:rgba(15,23,42,.88)}
  ` : ``}
  .nav{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    padding:16px 0;
  }
  .brand{
    font-size:22px;
    font-weight:800;
    color:var(--primary);
  }
  .navlinks{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    color:var(--muted);
    font-weight:600;
  }

  section{
    padding:56px 0;
  }

  .hero{
    padding:74px 0 60px;
    background:linear-gradient(180deg, rgba(255,255,255,.35), transparent);
  }
  .hero-inner{
    display:grid;
    grid-template-columns:${splitMode ? "1.1fr .9fr" : "1fr"};
    gap:24px;
    align-items:center;
  }
  .eyebrow{
    display:inline-block;
    padding:8px 12px;
    border-radius:999px;
    background:var(--line);
    color:var(--primary);
    font-weight:800;
    font-size:12px;
    margin-bottom:12px;
  }
  h1{
    font-size:clamp(34px,5vw,58px);
    line-height:1.08;
    margin:0 0 14px;
  }
  h2{
    font-size:clamp(28px,4vw,38px);
    line-height:1.15;
    margin:0 0 16px;
  }
  h3{margin-top:0}
  p{margin:0 0 14px;color:var(--muted)}
  .cta-row{
    display:flex;
    gap:12px;
    flex-wrap:wrap;
    margin-top:18px;
  }
  .btn{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    min-height:46px;
    padding:0 18px;
    border-radius:14px;
    font-weight:800;
    border:1px solid transparent;
  }
  .btn.primary{
    background:linear-gradient(135deg,var(--primary),var(--secondary));
    color:#fff;
  }
  .btn.soft{
    background:transparent;
    border-color:var(--line);
    color:var(--text);
  }

  .hero-card,
  .section-card,
  .card-item,
  .price-card,
  .faq-item,
  .contact-box{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:20px;
    box-shadow:0 12px 28px rgba(0,0,0,.05);
  }

  .hero-card{
    padding:22px;
  }
  .section-card{
    padding:24px;
  }
  .grid{
    display:grid;
    gap:16px;
  }
  .grid.three{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
  .grid.two{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
  .card-item,.price-card{
    padding:18px;
  }
  .gallery-box{
    min-height:150px;
    border-radius:18px;
    border:2px dashed var(--line);
    display:grid;
    place-items:center;
    color:var(--muted);
    background:rgba(255,255,255,.4);
  }
  .quote{
    margin:0;
    padding:18px;
    border-radius:18px;
    border:1px solid var(--line);
    background:var(--card);
    color:var(--text);
    font-weight:600;
  }
  .faq{
    display:grid;
    gap:12px;
  }
  .faq-item{
    padding:16px;
  }
  .contact-box{
    padding:20px;
  }
  input, textarea{
    width:100%;
    padding:12px 14px;
    border-radius:14px;
    border:1px solid var(--line);
    margin-bottom:12px;
    font:inherit;
    background:${style === "Dark" ? "#0f172a" : "#fff"};
    color:var(--text);
  }

  footer{
    padding:28px 0 44px;
    border-top:1px solid var(--line);
    color:var(--muted);
  }

  @media (max-width:900px){
    .hero-inner,
    .grid.three,
    .grid.two{
      grid-template-columns:1fr;
    }
  }
</style>
</head>
<body>
<header>
  <div class="container nav">
    <div class="brand">${escapeHtml(brandName)}</div>
    <nav class="navlinks">
      <a href="#about">About</a>
      <a href="#contact">Contact</a>
      <a href="#services">Sections</a>
    </nav>
  </div>
</header>

<main class="container">
  ${sectionsHTML}
</main>

<footer>
  <div class="container">
    © 2026 ${escapeHtml(brandName)}. Skeleton website generated by the Website Builder Wizard.
  </div>
</footer>
</body>
</html>`;
    }

    function buildContactHTML(mode) {
      if (mode === "WhatsApp") {
        return `
          <div class="contact-box">
            <p>Visitors can contact you quickly on WhatsApp.</p>
            <a class="btn primary" href="#">Chat on WhatsApp</a>
          </div>
        `;
      }
      if (mode === "Phone") {
        return `
          <div class="contact-box">
            <p>Visitors can call your team directly.</p>
            <a class="btn primary" href="#">Call Now</a>
          </div>
        `;
      }
      if (mode === "All") {
        return `
          <div class="contact-box">
            <p>This version includes form, phone, and WhatsApp contact methods.</p>
            <input placeholder="Your Name">
            <input placeholder="Email Address">
            <textarea placeholder="Your Message"></textarea>
            <div class="cta-row">
              <a class="btn primary" href="#">Send Message</a>
              <a class="btn soft" href="#">WhatsApp</a>
              <a class="btn soft" href="#">Call</a>
            </div>
          </div>
        `;
      }
      return `
        <div class="contact-box">
          <p>Visitors can send a standard enquiry using the form below.</p>
          <input placeholder="Your Name">
          <input placeholder="Email Address">
          <textarea placeholder="Your Message"></textarea>
          <a class="btn primary" href="#">Send Message</a>
        </div>
      `;
    }

    function getHeroText(siteType, tone, brandName) {
      const map = {
        Professional: {
          title: `${brandName} helps you build trust online.`,
          text: `This is a professional starter hero for a ${siteType.toLowerCase()} website. Use it to present your message clearly and guide visitors to the right next step.`
        },
        Warm: {
          title: `Welcome to ${brandName}.`,
          text: `This starter hero creates a friendly first impression for your ${siteType.toLowerCase()} website and invites visitors to explore with confidence.`
        },
        Bold: {
          title: `${brandName} makes a strong first impression.`,
          text: `This bold hero is designed to highlight your value quickly and drive visitors toward action on your ${siteType.toLowerCase()} website.`
        },
        Calm: {
          title: `${brandName} gives visitors a clear and calm starting point.`,
          text: `This softer hero layout is meant to feel reassuring, simple, and easy to understand while introducing your ${siteType.toLowerCase()} website.`
        }
      };
      return map[tone] || map.Professional;
    }

    function renderLivePreview() {
      const html = buildWebsiteHTML();
      const frame = document.getElementById("previewFrame");
      const codeView = document.getElementById("codeView");

      codeView.value = html;
      frame.srcdoc = html;

      document.getElementById("siteTypeBadge").textContent = `Type: ${state.answers.siteType || "Default"}`;
      document.getElementById("styleBadge").textContent = `Style: ${state.answers.style || "Default"}`;
      document.getElementById("themeBadge").textContent = `Theme: ${state.answers.colorTheme || "Orange"}`;
    }

    function downloadHTML() {
      const html = buildWebsiteHTML();
      const blob = new Blob([html], { type: "text/html" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      const safeName = (state.answers.brandName || "website")
        .toLowerCase()
        .replace(/[^a-z0-9]+/g, "-")
        .replace(/(^-|-$)/g, "");
      a.download = `${safeName || "website"}-skeleton.html`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g,"&amp;")
        .replace(/</g,"&lt;")
        .replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;")
        .replace(/'/g,"&#039;");
    }

    document.getElementById("nextBtn").addEventListener("click", nextStep);
    document.getElementById("backBtn").addEventListener("click", prevStep);
    document.getElementById("skipBtn").addEventListener("click", skipStep);
    document.getElementById("restartBtn").addEventListener("click", restart);
    document.getElementById("downloadBtn").addEventListener("click", downloadHTML);

    renderStep();
  </script>
</body>
</html>
