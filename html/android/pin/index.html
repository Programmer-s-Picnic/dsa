<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <title>Android PIN Login Demo</title>
  <meta name="description" content="Login using Android screen lock PIN, pattern, fingerprint, or passkey using WebAuthn." />
  <meta name="theme-color" content="#d97706" />

  <style>
    :root {
      --bg: #fff7ed;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --accent: #d97706;
      --accent-dark: #92400e;
      --border: #fed7aa;
      --success: #047857;
      --danger: #b91c1c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at top left, #ffedd5, transparent 35%),
        linear-gradient(135deg, #fff7ed, #fffbeb);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 20px;
    }

    .box {
      width: min(100%, 440px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 24px 70px rgba(146, 64, 14, 0.15);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: #ffedd5;
      color: var(--accent-dark);
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(28px, 6vw, 42px);
      line-height: 1.05;
      color: var(--accent-dark);
    }

    p {
      margin: 0 0 18px;
      color: var(--muted);
      line-height: 1.6;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    input {
      width: 100%;
      padding: 14px 16px;
      border: 1px solid var(--border);
      border-radius: 14px;
      font-size: 16px;
      outline: none;
      margin-bottom: 14px;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(217, 119, 6, 0.15);
    }

    .actions {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: white;
    }

    button.secondary {
      background: #ffedd5;
      color: var(--accent-dark);
    }

    button.danger {
      background: #fee2e2;
      color: var(--danger);
    }

    button:focus {
      outline: 4px solid rgba(217, 119, 6, 0.25);
      outline-offset: 2px;
    }

    .status {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      color: var(--text);
      line-height: 1.5;
      min-height: 52px;
    }

    .ok {
      color: var(--success);
      font-weight: 800;
    }

    .bad {
      color: var(--danger);
      font-weight: 800;
    }

    .note {
      font-size: 13px;
      margin-top: 16px;
      color: var(--muted);
    }

    code {
      background: #fff7ed;
      padding: 2px 6px;
      border-radius: 6px;
      color: var(--accent-dark);
    }
  </style>
</head>

<body>
  <main class="box">
    <div class="badge">Android PIN / Passkey Login</div>

    <h1>Secure Login</h1>

    <p>
      Register once, then login using your Android screen lock.
      Android may ask for PIN, pattern, password, fingerprint, or face unlock.
    </p>

    <label for="username">Username</label>
    <input id="username" value="champak" autocomplete="username" />

    <div class="actions">
      <button onclick="registerPasskey()">Register Android PIN Login</button>
      <button class="secondary" onclick="loginWithPasskey()">Login Using Android PIN</button>
      <button class="danger" onclick="clearLogin()">Clear Saved Demo Login</button>
    </div>

    <div id="status" class="status">
      Ready.
    </div>

    <p class="note">
      Important: this must run on <code>https://</code> or <code>localhost</code>.
      It will not work properly from a plain <code>file://</code> page.
    </p>
  </main>

  <script>
    const statusBox = document.getElementById("status");
    const usernameInput = document.getElementById("username");

    function setStatus(message, type = "") {
      statusBox.innerHTML = type
        ? `<span class="${type}">${message}</span>`
        : message;
    }

    function bufferToBase64Url(buffer) {
      const bytes = new Uint8Array(buffer);
      let binary = "";
      for (const byte of bytes) {
        binary += String.fromCharCode(byte);
      }

      return btoa(binary)
        .replace(/\+/g, "-")
        .replace(/\//g, "_")
        .replace(/=/g, "");
    }

    function base64UrlToBuffer(base64url) {
      const base64 = base64url
        .replace(/-/g, "+")
        .replace(/_/g, "/");

      const padded = base64.padEnd(
        base64.length + (4 - base64.length % 4) % 4,
        "="
      );

      const binary = atob(padded);
      const bytes = new Uint8Array(binary.length);

      for (let i = 0; i < binary.length; i++) {
        bytes[i] = binary.charCodeAt(i);
      }

      return bytes.buffer;
    }

    function randomChallenge(length = 32) {
      const array = new Uint8Array(length);
      crypto.getRandomValues(array);
      return array;
    }

    async function checkSupport() {
      if (!window.PublicKeyCredential) {
        throw new Error("WebAuthn is not supported in this browser.");
      }

      const available =
        await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();

      if (!available) {
        throw new Error(
          "No Android screen-lock authenticator was found. Set a PIN, pattern, password, or biometric lock first."
        );
      }
    }

    async function registerPasskey() {
      try {
        await checkSupport();

        const username = usernameInput.value.trim();

        if (!username) {
          setStatus("Please enter a username.", "bad");
          return;
        }

        const userId = new TextEncoder().encode(username);

        const publicKeyOptions = {
          challenge: randomChallenge(),

          rp: {
            name: "Learn With Champak Demo"
          },

          user: {
            id: userId,
            name: username,
            displayName: username
          },

          pubKeyCredParams: [
            { type: "public-key", alg: -7 },
            { type: "public-key", alg: -257 }
          ],

          authenticatorSelection: {
            authenticatorAttachment: "platform",
            userVerification: "required",
            residentKey: "preferred"
          },

          timeout: 60000,
          attestation: "none"
        };

        setStatus("Android will now ask for screen lock confirmation...");

        const credential = await navigator.credentials.create({
          publicKey: publicKeyOptions
        });

        const savedCredential = {
          id: credential.id,
          rawId: bufferToBase64Url(credential.rawId),
          type: credential.type,
          username
        };

        localStorage.setItem("androidPinCredential", JSON.stringify(savedCredential));

        setStatus("Android PIN login registered successfully.", "ok");
      } catch (error) {
        setStatus(error.message || "Registration failed.", "bad");
      }
    }

    async function loginWithPasskey() {
      try {
        await checkSupport();

        const saved = localStorage.getItem("androidPinCredential");

        if (!saved) {
          setStatus("No saved login found. Register first.", "bad");
          return;
        }

        const credentialData = JSON.parse(saved);

        const publicKeyOptions = {
          challenge: randomChallenge(),

          allowCredentials: [
            {
              id: base64UrlToBuffer(credentialData.rawId),
              type: "public-key",
              transports: ["internal"]
            }
          ],

          userVerification: "required",
          timeout: 60000
        };

        setStatus("Android will now ask for PIN, pattern, password, fingerprint, or face unlock...");

        const assertion = await navigator.credentials.get({
          publicKey: publicKeyOptions
        });

        if (assertion) {
          setStatus(`Login successful. Welcome, ${credentialData.username}.`, "ok");
        } else {
          setStatus("Login failed.", "bad");
        }
      } catch (error) {
        setStatus(error.message || "Login failed.", "bad");
      }
    }

    function clearLogin() {
      localStorage.removeItem("androidPinCredential");
      setStatus("Saved demo login cleared.");
    }
  </script>
</body>
</html>
