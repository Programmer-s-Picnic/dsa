    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Champak Roy • Programmer's Picnic • V5 Smiling Animated SVG</title>
    <meta
      name="description"
      content="A photo-like smiling animated SVG hero for Champak Roy and Programmer's Picnic."
    />
    <style>
      :root {
        --bg: #f6f2ec;
        --panel: #fffaf4;
        --ink: #1f2937;
        --muted: #6b7280;
        --brand: #d97706;
        --brand2: #f59e0b;
        --line: #e8ddd0;
        --shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
        --radius: 28px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Arial,
          sans-serif;
        color: var(--ink);
        background:
          radial-gradient(
            circle at top left,
            rgba(255, 255, 255, 0.72),
            transparent 26%
          ),
          linear-gradient(135deg, #faf7f2, #efe7dc);
        min-height: 100vh;
      }

      .wrap {
        width: min(1320px, calc(100% - 28px));
        margin: 0 auto;
        padding: 24px 0 36px;
      }

      .hero {
        background: rgba(255, 255, 255, 0.78);
        border: 1px solid rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        border-radius: var(--radius);
        overflow: hidden;
        box-shadow: var(--shadow);
      }

      .hero-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 20px 22px;
        border-bottom: 1px solid var(--line);
        background: linear-gradient(
          90deg,
          rgba(217, 119, 6, 0.1),
          rgba(245, 158, 11, 0.05)
        );
        flex-wrap: wrap;
      }

      .brand {
        display: flex;
        gap: 14px;
        align-items: center;
      }

      .brand-badge {
        width: 54px;
        height: 54px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--brand), var(--brand2));
        color: #fff;
        display: grid;
        place-items: center;
        font-weight: 900;
        font-size: 24px;
        letter-spacing: 0.5px;
        box-shadow: 0 12px 28px rgba(217, 119, 6, 0.28);
        flex: none;
      }

      .hero-top h1 {
        margin: 0;
        line-height: 1.08;
        font-size: clamp(1.35rem, 2vw, 2rem);
      }

      .hero-top p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 0.98rem;
      }

      .actions {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 11px 16px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          box-shadow 0.18s ease;
      }

      button:hover {
        transform: translateY(-1px);
      }

      .primary {
        background: linear-gradient(90deg, var(--brand), var(--brand2));
        color: #fff;
        box-shadow: 0 10px 24px rgba(217, 119, 6, 0.24);
      }

      .secondary {
        background: #fff;
        color: var(--ink);
        border: 1px solid var(--line);
      }

      .stage {
        padding: 18px;
      }

      .svg-shell {
        background: #f7f4ef;
        border: 1px solid var(--line);
        border-radius: 22px;
        overflow: hidden;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.85);
      }

      svg {
        display: block;
        width: 100%;
        height: auto;
      }

      .bottom {
        padding: 14px 22px 20px;
        color: var(--muted);
        font-size: 0.95rem;
      }

      code {
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 0.9em;
      }

      @media (max-width: 720px) {
        .hero-top {
          padding: 16px;
        }
        .stage {
          padding: 10px;
        }
        .bottom {
          padding: 10px 16px 16px;
        }
      }
    </style>

    <script>
      (function () {
        const svg = document.getElementById("ppSvg");
        const toggleBtn = document.getElementById("toggleBtn");
        const downloadBtn = document.getElementById("downloadBtn");
        let paused = false;

        toggleBtn.addEventListener("click", function () {
          paused = !paused;
          if (paused) {
            svg.classList.add("paused");
            toggleBtn.textContent = "Play Animation";
          } else {
            svg.classList.remove("paused");
            toggleBtn.textContent = "Pause Animation";
          }
        });

        downloadBtn.addEventListener("click", function () {
          const copy = svg.cloneNode(true);
          copy.removeAttribute("id");
          copy.removeAttribute("class");

          const serializer = new XMLSerializer();
          const svgString = serializer.serializeToString(copy);
          const blob = new Blob([svgString], {
            type: "image/svg+xml;charset=utf-8",
          });
          const url = URL.createObjectURL(blob);

          const a = document.createElement("a");
          a.href = url;
          a.download = "champak-roy-programmers-picnic-smiling-animated.svg";
          document.body.appendChild(a);
          a.click();
          a.remove();

          setTimeout(function () {
            URL.revokeObjectURL(url);
          }, 1200);
        });
      })();
    </script>
