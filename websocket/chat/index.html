<!doctype html>
<html>

<head>
    <meta charset="utf-8">
    <title>Durable Object WebSocket Test</title>
</head>

<body>
    <h1>WebSocket Test</h1>
    <button onclick="connect()">Connect</button>
    <button onclick="sendMsg()">Send</button>
    <pre id="log"></pre>

    <script>
        let ws;
        const logBox = document.getElementById("log");

        function log(...args) {
            logBox.textContent += args.join(" ") + "\n";
            console.log(...args);
        }

        function connect() {
            ws = new WebSocket("wss://champak-durable-chat.champaksworld.workers.dev/");

            ws.onopen = () => {
                log("Connected");
                ws.send("Champak");
            };

            ws.onmessage = event => {
                log("Received:", event.data);
            };

            ws.onerror = event => {
                log("Error:", event.type);
            };

            ws.onclose = event => {
                log("Closed:", event.code, event.reason);
            };
        }

        function sendMsg() {
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                log("Not connected");
                return;
            }

            ws.send("Hello again");
        }
    </script>
</body>

</html>
