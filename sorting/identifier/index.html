<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sorting Variations Lab | Programmer's Picnic</title>

<style>
body{margin:0;font-family:Arial;background:#fffaf0;color:#2b2112}
.wrap{max-width:1100px;margin:auto;padding:20px}
textarea{width:100%;height:200px;padding:12px;border-radius:10px;border:1px solid #f1d7a8}
button,select{
  margin:8px 5px 0 0;
  padding:10px 16px;
  border-radius:999px;
  border:0;
  background:#f59e0b;
  color:#fff;
  font-weight:bold;
  cursor:pointer
}
.card{margin-top:15px;padding:15px;background:#fff;border-radius:12px;border:1px solid #f1d7a8}
.result{font-size:28px;font-weight:900;color:#d97706}
.barrow{display:flex;gap:6px}
.bar{
  min-width:40px;
  background:#f59e0b;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:flex-end;
  border-radius:6px
}
.correct{outline:3px solid green}
.wrong{outline:3px solid red}
.good{color:green;font-weight:bold}
.bad{color:red;font-weight:bold}
.example{margin-top:10px;padding:10px;border:1px solid #f1d7a8;border-radius:10px}
pre{background:#2b2112;color:#fff;padding:10px;border-radius:10px}
</style>
</head>

<body>
<div class="wrap">

<h1>Sorting Variations Lab</h1>

<select id="exampleSelect"></select>
<button onclick="loadExample()">Load Example</button>

<textarea id="input"></textarea>

<button onclick="identify()">Identify</button>
<button onclick="play()">Animate</button>

<div class="card">
<div id="result" class="result">Waiting...</div>
<div id="reason"></div>
</div>

<div class="card" id="scores"></div>
<div class="card" id="viz"></div>
<div class="card" id="feedback"></div>

<div class="card">
<h2>Examples</h2>
<div id="exampleList"></div>
</div>

</div>

<script>

/* ================= EXAMPLES ================= */
const EXAMPLES=[
{
name:"Bubble Example",
exp:"Largest element moves right every pass",
svg:`<svg viewBox="0 0 300 80"><text x="10" y="40">5 → 8 (largest right)</text></svg>`,
text:`Start:[5,1,4,2,8]
Pass1:[1,4,2,5,8]
Pass2:[1,2,4,5,8]`
},
{
name:"Selection Example",
exp:"Minimum element moves left",
svg:`<svg viewBox="0 0 300 80"><text x="10" y="40">1 goes to front</text></svg>`,
text:`Start:[5,1,4,2,8]
Pass1:[1,5,4,2,8]
Pass2:[1,2,4,5,8]`
},
{
name:"Insertion Example",
exp:"Sorted left grows",
svg:`<svg viewBox="0 0 300 80"><text x="10" y="40">Insert into sorted left</text></svg>`,
text:`Start:[5,1,4,2]
Pass1:[1,5,4,2]
Pass2:[1,4,5,2]`
}
];

const select=document.getElementById("exampleSelect");
select.innerHTML=EXAMPLES.map((e,i)=>`<option value="${i}">${e.name}</option>`).join("");

function loadExample(){
  let e=EXAMPLES[select.value];
  document.getElementById("input").value=e.text;
}

/* ================= PARSE ================= */
function parse(text){
  return text.split("\n")
    .map(l=>l.match(/\[(.*?)\]/))
    .filter(Boolean)
    .map(m=>m[1].split(",").map(x=>+x));
}

function same(a,b){
  return a.length===b.length && a.every((v,i)=>v===b[i]);
}

/* ================= SORTS ================= */
function bubble(a){
  a=[...a];let s=[];
  for(let i=0;i<a.length;i++){
    for(let j=0;j<a.length-1-i;j++){
      if(a[j]>a[j+1])[a[j],a[j+1]]=[a[j+1],a[j]];
    }
    s.push([...a]);
  }
  return s;
}

function selection(a){
  a=[...a];let s=[];
  for(let i=0;i<a.length;i++){
    let m=i;
    for(let j=i+1;j<a.length;j++){
      if(a[j]<a[m])m=j;
    }
    [a[i],a[m]]=[a[m],a[i]];
    s.push([...a]);
  }
  return s;
}

function insertion(a){
  a=[...a];let s=[];
  for(let i=1;i<a.length;i++){
    let k=a[i],j=i-1;
    while(j>=0&&a[j]>k){
      a[j+1]=a[j];j--;
    }
    a[j+1]=k;
    s.push([...a]);
  }
  return s;
}

/* ================= SCORE ================= */
function score(exp,act){
  let a=act.slice(1),p=0;
  for(let i=0;i<a.length;i++){
    if(exp[i]&&same(exp[i],a[i]))p++;
  }
  return Math.round(p/a.length*100);
}

/* ================= IDENTIFY ================= */
function identify(){
  let steps=parse(document.getElementById("input").value);
  if(steps.length<2)return;

  let start=steps[0];

  let algos={
    "Bubble":bubble(start),
    "Selection":selection(start),
    "Insertion":insertion(start)
  };

  let res=Object.entries(algos)
    .map(([n,e])=>({name:n,exp:e,score:score(e,steps)}))
    .sort((a,b)=>b.score-a.score);

  let best=res[0];

  document.getElementById("result").innerText=best.name+" Sort";

  document.getElementById("reason").innerText={
    Bubble:"Largest elements move right",
    Selection:"Minimum moves left",
    Insertion:"Sorted part grows"
  }[best.name];

  document.getElementById("scores").innerHTML=
    res.map(r=>`${r.name}: <span class="${r.score>60?'good':'bad'}">${r.score}%</span>`).join("<br>");

  visualize(steps,best.exp);
  feedback(steps,best.exp);
}

/* ================= VISUAL ================= */
function visualize(steps,exp){
  let max=Math.max(...steps.flat());

  document.getElementById("viz").innerHTML=
    steps.map((a,i)=>{
      let cls="";
      if(exp && i>0){
        cls=same(a,exp[i-1])?"correct":"wrong";
      }
      return `
        <div class="${cls}">
        <h3>${i===0?"Start":"Pass "+i}</h3>
        <div class="barrow">
        ${a.map(x=>`<div class="bar" style="height:${40+(x/max)*120}px">${x}</div>`).join("")}
        </div>
        </div>`;
    }).join("");
}

/* ================= FEEDBACK ================= */
function feedback(steps,exp){
  let out="";
  for(let i=1;i<steps.length;i++){
    if(exp[i-1] && same(steps[i],exp[i-1])){
      out+=`Pass ${i}: Correct<br>`;
    }else{
      out+=`Pass ${i}: Wrong<br>`;
    }
  }
  document.getElementById("feedback").innerHTML=out;
}

/* ================= PLAY ================= */
function play(){
  let steps=parse(document.getElementById("input").value);
  let i=0;
  let t=setInterval(()=>{
    visualize([steps[i]]);
    i++;
    if(i>=steps.length)clearInterval(t);
  },700);
}

/* ================= RENDER EXAMPLES ================= */
document.getElementById("exampleList").innerHTML=
  EXAMPLES.map(e=>`
    <div class="example">
      <b>${e.name}</b><br>
      ${e.exp}<br>
      ${e.svg}
      <pre>${e.text}</pre>
    </div>
  `).join("");

loadExample();
identify();

</script>
</body>
</html>
