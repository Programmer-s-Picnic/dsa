<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
<!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-F22HP86FYK"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());

    gtag('config', 'G-F22HP86FYK');
  </script>
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<main>
  <h1>Products</h1>
  <section>
    <article th:each="p : ${products}">
      <h2 th:text="${p.name}">Product name</h2>
      <p th:text="${p.description}">Description</p>
      <p>Price: <span th:text="${p.price}">0</span></p>
      <p>Stock: <span th:text="${p.stock}">0</span></p>
      <form th:action="@{/cart/add}" method="post">
        <input type="hidden" name="productId" th:value="${p.id}">
        <input type="number" name="quantity" value="1" min="1">
        <button type="submit">Add to Cart</button>
      </form>
    </article>
  </section>
</main>
<div th:replace="~{fragments/footer :: footer}"></div>
</body>
</html>
